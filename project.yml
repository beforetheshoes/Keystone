name: Keystone
options:
  bundleIdPrefix: com.ryanleewilliams
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    # `SWIFT_APPROACHABLE_CONCURRENCY=YES` is the umbrella flag — it
    # auto-enables NonisolatedNonsendingByDefault (nonisolated async
    # functions stay on the caller's actor) plus the other Swift 6.2
    # approachability upcoming features (InferIsolatedConformances,
    # InferSendableFromCaptures, DisableOutwardActorInference,
    # GlobalActorIsolatedTypesUsability). Forces an explicit @concurrent
    # at sites that need a real off-MainActor hop.
    #
    # NOTE: `SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor` is NOT enabled
    # because it triggers circular-reference errors in TCA's `@Reducer`
    # macro expansion in Xcode 26 (swift-composable-architecture 1.23+).
    # The macro generates body/Body type relationships that interact
    # badly with default MainActor inference on the enclosing reducer
    # struct. Revisit if/when TCA ships explicit isolation annotations
    # in the macro expansion. The approachable-concurrency umbrella is
    # the safe subset for a TCA codebase right now.
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    DEVELOPMENT_TEAM: 777XX46HDU
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Xcode-recommended settings (keeps "Update to recommended settings"
    # prompt from reappearing every time xcodegen regenerates the project).
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZED_STRING_SWIFTUI_SUPPORT: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  swift-composable-architecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.23.0
  sqlite-data:
    url: https://github.com/pointfreeco/sqlite-data
    from: 1.5.0
  swift-structured-queries:
    url: https://github.com/pointfreeco/swift-structured-queries
    from: 0.28.0
  swift-navigation:
    url: https://github.com/pointfreeco/swift-navigation
    from: 2.6.0
  swift-dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: 1.12.0
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

targets:
  Keystone:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Keystone
    resources:
      - path: Keystone/Resources/Assets.xcassets
      - path: Keystone/Resources/Help
    info:
      path: Keystone/Resources/Info.plist
      properties:
        CFBundleDisplayName: Keystone
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
        ITSAppUsesNonExemptEncryption: false
        # Required when calling LocalAuthentication's biometric policies
        # on devices that have Face ID. Touch ID / password fallback don't
        # require a usage description, but Face ID does — without this
        # key, the system silently rejects the auth request on Face ID
        # hardware.
        NSFaceIDUsageDescription: Keystone uses Face ID to unlock the app and protected records.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        # Surfaces the Documents subfolder of our ubiquity container as
        # a user-visible "Keystone" folder in Finder's iCloud Drive
        # sidebar and in Files.app on iPhone/iPad. Without this key the
        # Documents folder exists but is private to the app.
        NSUbiquitousContainers:
          iCloud.com.ryanleewilliams.keystone:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Keystone
            NSUbiquitousContainerSupportedFolderLevels: Any
    entitlements:
      path: Keystone/Resources/Keystone.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        # SwiftPM frameworks are linker-signed (ad-hoc, no team). Under
        # hardened runtime + a team-signed app, dyld rejects them with a
        # team-ID mismatch. This entitlement tells the runtime it's OK to
        # load libraries with a different signature than the host process.
        com.apple.security.cs.disable-library-validation: true
        # CloudKit (row-level sync via SyncEngine) + CloudDocuments (the
        # iCloud Drive folder a user picks in Settings → Storage). Both
        # use the same container ID; conventional form is iCloud.<bundle-id>.
        com.apple.developer.icloud-services:
          - CloudKit
          - CloudDocuments
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ryanleewilliams.keystone
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.ryanleewilliams.keystone
        # APS env for CloudKit push notifications (silent change pushes).
        # `production` here means both Debug and Release builds talk to
        # the Production CloudKit environment — schema must be promoted
        # via the CloudKit Dashboard (Schema → Deploy Schema to
        # Production) before this works. Switching back to `development`
        # would re-route to the Dev environment, which has its own
        # separate schema + record store.
        aps-environment: production
        com.apple.developer.aps-environment: production
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanleewilliams.keystone
        PRODUCT_NAME: Keystone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        # SwiftUI Previews require a debug-dylib stub that statically links
        # transitive Swift modules. Combined with SwiftPM dynamic frameworks
        # (e.g. IssueReporting via TCA / sqlite-data / swift-navigation) it
        # produces "Class implemented in both" warnings at runtime. Off by
        # default; flip to YES temporarily if you actually need a #Preview.
        ENABLE_PREVIEWS: NO
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: swift-composable-architecture
        product: ComposableArchitecture
      - package: sqlite-data
        product: SQLiteData
      - package: swift-structured-queries
        product: StructuredQueries
      - package: swift-navigation
        product: SwiftNavigation
      - package: swift-dependencies
        product: Dependencies
      - package: swift-dependencies
        product: DependenciesMacros
      - package: GRDB
        product: GRDB

  KeystoneTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - path: KeystoneTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanleewilliams.keystone.tests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Keystone.app/Contents/MacOS/Keystone
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Keystone
      - package: swift-composable-architecture
        product: ComposableArchitecture
      - package: sqlite-data
        product: SQLiteData
      - package: swift-dependencies
        product: Dependencies
      - package: GRDB
        product: GRDB
      # AppLockFlowTests uses TestStore's `\.actionCase` keypath
      # syntax which resolves to CasePathsCore types — must be
      # linked into the test bundle explicitly even though it's
      # transitive via TCA.
      - package: swift-composable-architecture
        product: CasePaths

  KeystoneUITests:
    type: bundle.ui-testing
    supportedDestinations: [macOS]
    sources:
      - path: KeystoneUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanleewilliams.keystone.uitests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        TEST_TARGET_NAME: Keystone
    dependencies:
      - target: Keystone

schemes:
  Keystone:
    build:
      targets:
        Keystone: all
        KeystoneTests: [test]
        KeystoneUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KeystoneTests
        - KeystoneUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
